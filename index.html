<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC neighborhoods I've visited</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; color: #1a1a18; }

    #header {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #e0ded8;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    #header h1 { font-size: 16px; font-weight: 500; flex-shrink: 0; }
    #stats { font-size: 13px; color: #666; }
    #stats strong { color: #1a1a18; font-weight: 500; }

    #borough-filter { display: flex; gap: 6px; flex-wrap: wrap; }
    .bfilter {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      border: 1px solid #ccc; background: #fff; color: #555;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .bfilter:hover { border-color: #999; color: #1a1a18; }
    .bfilter.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }

    #actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    #load-btn, #save-btn, #random-btn {
      font-size: 12px; padding: 5px 12px; border-radius: 6px;
      border: 1px solid #ccc; background: #fff; cursor: pointer; transition: all 0.15s;
    }
    #save-btn { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    #save-btn:hover { background: #333; }
    #load-btn:hover { background: #f5f4f0; }
    #random-btn { background: #d4a017; color: #fff; border-color: #d4a017; }
    #random-btn:hover { background: #b8890f; }
    #file-input { display: none; }

    #map { height: calc(100vh - 58px); width: 100%; }

    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1a1a18; color: #fff; padding: 8px 16px;
      border-radius: 8px; font-size: 13px; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .legend {
      background: white; padding: 10px 12px; border-radius: 8px;
      border: 1px solid #e0ded8; font-size: 12px; line-height: 1.8;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    .neighborhood-label {
      color: #fff; font-size: 11px; font-weight: 500; white-space: nowrap;
      text-transform: uppercase; letter-spacing: 0.3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.7), 0 0 3px rgba(0,0,0,0.5);
      transform: translate(-50%, -50%); pointer-events: none;
    }

    /* Modal overlay */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 10000;
      align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #fff; border-radius: 12px; padding: 24px;
      width: 380px; max-width: calc(100vw - 32px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    #modal h2 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    #modal .borough-label { font-size: 12px; color: #888; margin-bottom: 16px; }
    .field-label { font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 500; }
    .month-year-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .month-year-row select {
      flex: 1; padding: 7px 8px; border: 1px solid #ccc; border-radius: 6px;
      font-size: 13px; background: #fff; color: #1a1a18;
    }
    #modal-notes {
      width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;
      font-size: 13px; font-family: inherit; resize: vertical;
      min-height: 80px; color: #1a1a18; margin-bottom: 16px;
    }
    #modal-notes:focus, .month-year-row select:focus { outline: 2px solid #b5d4f4; border-color: #185fa5; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      font-size: 13px; padding: 7px 16px; border-radius: 6px;
      border: 1px solid #ccc; background: #fff; cursor: pointer; transition: all 0.15s;
    }
    #modal-save { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    #modal-save:hover { background: #333; }
    #modal-unmark { color: #c00; border-color: #f5c1c1; }
    #modal-unmark:hover { background: #fff5f5; }
    #modal-cancel:hover { background: #f5f4f0; }
    .visited-meta { font-size: 11px; color: #888; margin-top: 2px; }
  </style>
</head>
<body>

<div id="header">
  <h1>NYC neighborhoods</h1>
  <div id="stats"><strong id="visited-count">0</strong> of <strong id="total-count">0</strong> visited (<strong id="pct">0%</strong>)</div>
  <div id="borough-filter">
    <button class="bfilter active" data-b="all">All</button>
    <button class="bfilter" data-b="Manhattan">Manhattan</button>
    <button class="bfilter" data-b="Brooklyn">Brooklyn</button>
    <button class="bfilter" data-b="Queens">Queens</button>
    <button class="bfilter" data-b="Bronx">The Bronx</button>
    <button class="bfilter" data-b="Staten Island">Staten Island</button>
  </div>
  <div id="actions">
    <label style="font-size:12px;color:#555;display:flex;align-items:center;gap:4px;white-space:nowrap;">
      <input type="checkbox" id="random-wishlist-only" /> Wishlist only
    </label>
    <button id="random-btn">🎲 Random neighborhood</button>
    <input type="file" id="file-input" accept=".json" />
    <button id="load-btn">Load data.json</button>
    <button id="save-btn">Save data.json ↓</button>
  </div>
</div>

<div id="map"></div>
<div id="toast"></div>

<!-- Detail modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-name"></h2>
    <div class="borough-label" id="modal-borough"></div>
    <div class="field-label">When did you visit?</div>
    <div class="month-year-row">
      <select id="modal-month">
        <option value="">Month (optional)</option>
        <option value="1">January</option><option value="2">February</option>
        <option value="3">March</option><option value="4">April</option>
        <option value="5">May</option><option value="6">June</option>
        <option value="7">July</option><option value="8">August</option>
        <option value="9">September</option><option value="10">October</option>
        <option value="11">November</option><option value="12">December</option>
      </select>
      <select id="modal-year" style="flex:0 0 100px;">
        <option value="">Year</option>
      </select>
    </div>
    <div class="field-label">Relationship</div>
    <select id="modal-relationship" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;color:#1a1a18;margin-bottom:6px;">
      <option value="">Select a relationship type…</option>
      <option value="Live(d) Here">Live(d) Here</option>
      <option value="Visit Regularly">Visit Regularly</option>
      <option value="Visit Rarely">Visit Rarely</option>
      <option value="One-Time Visit">One-Time Visit</option>
      <option value="Visited Pre-Move">Visited Pre-Move</option>
      <option value="Not Publicly Accessible">Not Publicly Accessible</option>
    </select>
    <div id="modal-relationship-error" style="display:none;color:#c00;font-size:11px;margin-bottom:8px;">Please select a relationship type before saving.</div>
    <div class="field-label">Notes</div>
    <textarea id="modal-notes" placeholder="What brought you here? A restaurant, friend's place, event…"></textarea>
    <div id="modal-wishlist-row" style="margin-top:14px;">
      <button id="modal-wishlist-toggle" style="font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid #d4a017;background:#fff;color:#9a7611;cursor:pointer;">☆ Add to wishlist</button>
      <div id="modal-wishlist-note" style="display:none;font-size:11px;color:#888;margin-top:4px;"></div>
    </div>
    <div class="modal-actions">
      <button id="modal-unmark">Remove visit</button>
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save">Save</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const BOROUGH_UNVISITED = {
    "Manhattan":     "#b8d8f0",
    "Brooklyn":      "#d8edb0",
    "Queens":        "#b8e8c8",
    "Bronx":         "#a8ddd8",
    "Staten Island": "#f5f0c0",
  };

  const RELATIONSHIP_TYPES = {
    "Live(d) Here":         { fill: "#9b59b6", border: "#6c3e80" },
    "Visit Regularly":      { fill: "#ff69b4", border: "#b34a7e" },
    "Visit Rarely":         { fill: "#ffaa00", border: "#b37700" },
    "One-Time Visit":       { fill: "#ff5500", border: "#b33c00" },
    "Visited Pre-Move": { fill: "#9e8e85", border: "#6e6058" },
    "Not Publicly Accessible": { fill: "#ffffff", border: "#cccccc" },
  };

  const MONTHS = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const map = L.map("map", { center: [40.7128, -74.006], zoom: 11 });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(map);

  const STREET_LABEL_ZOOM = 13;
  const streetLabelsLayer = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png", {
    maxZoom: 18,
  });
  function updateStreetLabels() {
    const show = map.getZoom() >= STREET_LABEL_ZOOM;
    if (show && !map.hasLayer(streetLabelsLayer)) streetLabelsLayer.addTo(map);
    if (!show && map.hasLayer(streetLabelsLayer)) map.removeLayer(streetLabelsLayer);
  }
  map.on("zoomend", updateStreetLabels);
  updateStreetLabels();

  // visited: { [name]: { month: int|null, year: int|null, notes: string, relationshipType: string|null } }
  let visited = {};
  // wishlist: { [borough]: neighborhoodName } — at most one wishlist pick per borough
  let wishlist = {};
  let geojsonLayer = null;
  let allFeatures = [];
  let activeBorough = "all";
  const NEIGHBORHOOD_LABEL_ZOOM = 14;
  const labelsLayerGroup = L.layerGroup();
  const labelMarkers = {};
  const layersByName = {};
  let highlightedLayer = null;
  function updateNeighborhoodLabels() {
    const show = map.getZoom() >= NEIGHBORHOOD_LABEL_ZOOM;
    if (show && !map.hasLayer(labelsLayerGroup)) labelsLayerGroup.addTo(map);
    if (!show && map.hasLayer(labelsLayerGroup)) map.removeLayer(labelsLayerGroup);
  }
  map.on("zoomend", updateNeighborhoodLabels);

  // Populate year dropdown (2000–current)
  const yearSelect = document.getElementById("modal-year");
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= 1999; y--) {
    const opt = document.createElement("option");
    opt.value = y; opt.textContent = y;
    yearSelect.appendChild(opt);
  }

  function boroughKey(props) {
    const b = (props.boroname || props.borough || props.BoroName || "").trim();
    if (b === "The Bronx" || b === "Bronx") return "Bronx";
    return b;
  }

  function neighborhoodName(props) {
    return (props.NTAName || props.neighborhood || props.name || props.ntaname || "Unknown").trim();
  }

  function isVisited(name) { return !!visited[name]; }

  function isWishlisted(name, b) { return wishlist[b] === name; }

  const WISHLIST_BORDER = "#d4a017";

  function styleFeature(feature) {
    const b = boroughKey(feature.properties);
    const name = neighborhoodName(feature.properties);
    const entry = visited[name];
    const unvisitedColor = BOROUGH_UNVISITED[b] || "#ddd";
    const rel = entry && entry.relationshipType ? RELATIONSHIP_TYPES[entry.relationshipType] : null;
    if (rel) {
      return { fillColor: rel.fill, fillOpacity: 0.75, color: rel.border, weight: 1.5 };
    }
    if (isWishlisted(name, b)) {
      return { fillColor: unvisitedColor, fillOpacity: 0.45, color: WISHLIST_BORDER, weight: 2.5, dashArray: "5,4" };
    }
    return { fillColor: unvisitedColor, fillOpacity: 0.45, color: "#999", weight: 0.8 };
  }

  function formatMeta(entry) {
    if (!entry) return "";
    const parts = [];
    if (entry.relationshipType) parts.push(entry.relationshipType);
    if (entry.month || entry.year) {
      parts.push([entry.month ? MONTHS[entry.month] : null, entry.year].filter(Boolean).join(" "));
    }
    if (entry.notes) parts.push(entry.notes.slice(0, 60) + (entry.notes.length > 60 ? "…" : ""));
    return parts.join(" · ");
  }

  function tooltipContent(name, b, entry) {
    let html = `<strong>${name}</strong><br><span style="color:#666;font-size:11px">${b === "Bronx" ? "The Bronx" : b}</span>`;
    if (entry) {
      const meta = formatMeta(entry);
      if (meta) html += `<br><span style="color:#555;font-size:11px">${meta}</span>`;
    }
    if (isWishlisted(name, b)) html += `<br><span style="color:${WISHLIST_BORDER};font-size:11px">★ Wishlist</span>`;
    return html;
  }

  function updateStats() {
    const filtered = activeBorough === "all"
      ? allFeatures
      : allFeatures.filter(f => boroughKey(f.properties) === activeBorough);
    const total = filtered.length;
    const v = filtered.filter(f => isVisited(neighborhoodName(f.properties))).length;
    document.getElementById("visited-count").textContent = v;
    document.getElementById("total-count").textContent = total;
    document.getElementById("pct").textContent = total ? Math.round(v / total * 100) + "%" : "0%";
  }

  function refreshLayer() {
    if (!geojsonLayer) return;
    geojsonLayer.eachLayer(layer => {
      const b = boroughKey(layer.feature.properties);
      const show = activeBorough === "all" || b === activeBorough;
      const name = neighborhoodName(layer.feature.properties);
      const labelEl = labelMarkers[name] && labelMarkers[name].getElement();
      if (show) {
        layer.setStyle(styleFeature(layer.feature));
        layer.getElement() && (layer.getElement().style.display = "");
        layer.setTooltipContent(tooltipContent(name, b, visited[name]));
        labelEl && (labelEl.style.display = "");
      } else {
        layer.getElement() && (layer.getElement().style.display = "none");
        labelEl && (labelEl.style.display = "none");
      }
    });
    updateStats();
  }

  // Modal state
  let modalLayer = null;
  let modalName = "";
  let modalBorough = "";

  function updateWishlistButton() {
    const row = document.getElementById("modal-wishlist-row");
    const btn = document.getElementById("modal-wishlist-toggle");
    const note = document.getElementById("modal-wishlist-note");
    if (isVisited(modalName)) {
      row.style.display = "none";
      return;
    }
    row.style.display = "";
    if (isWishlisted(modalName, modalBorough)) {
      btn.textContent = "★ Remove from wishlist";
      btn.disabled = false;
      note.style.display = "none";
    } else if (wishlist[modalBorough]) {
      btn.textContent = "☆ Add to wishlist";
      btn.disabled = true;
      note.textContent = `${modalBorough === "Bronx" ? "The Bronx" : modalBorough} already has a wishlist pick: ${wishlist[modalBorough]}`;
      note.style.display = "";
    } else {
      btn.textContent = "☆ Add to wishlist";
      btn.disabled = false;
      note.style.display = "none";
    }
  }

  function openModal(name, borough, layer) {
    modalName = name;
    modalBorough = borough;
    modalLayer = layer;
    document.getElementById("modal-name").textContent = name;
    document.getElementById("modal-borough").textContent = borough === "Bronx" ? "The Bronx" : borough;
    const entry = visited[name] || {};
    document.getElementById("modal-month").value = entry.month || "";
    document.getElementById("modal-year").value = entry.year || "";
    document.getElementById("modal-relationship").value = entry.relationshipType || "";
    document.getElementById("modal-relationship-error").style.display = "none";
    document.getElementById("modal-notes").value = entry.notes || "";
    document.getElementById("modal-unmark").style.display = isVisited(name) ? "" : "none";
    updateWishlistButton();
    document.getElementById("modal-overlay").classList.add("open");
    setTimeout(() => document.getElementById("modal-notes").focus(), 50);
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    modalLayer = null;
    modalName = "";
    modalBorough = "";
  }

  function refreshModalLayerVisuals() {
    if (!modalLayer) return;
    modalLayer.setStyle(styleFeature(modalLayer.feature));
    modalLayer.setTooltipContent(tooltipContent(modalName, modalBorough, visited[modalName]));
  }

  document.getElementById("modal-wishlist-toggle").addEventListener("click", () => {
    if (isWishlisted(modalName, modalBorough)) {
      delete wishlist[modalBorough];
      showToast(`${modalName} removed from wishlist`);
    } else if (!wishlist[modalBorough]) {
      wishlist[modalBorough] = modalName;
      showToast(`★ ${modalName} added to wishlist`);
    }
    refreshModalLayerVisuals();
    closeModal();
  });

  document.getElementById("modal-save").addEventListener("click", () => {
    const relationshipType = document.getElementById("modal-relationship").value || null;
    const relationshipError = document.getElementById("modal-relationship-error");
    if (!relationshipType) {
      relationshipError.style.display = "block";
      return;
    }
    relationshipError.style.display = "none";
    const month = parseInt(document.getElementById("modal-month").value) || null;
    const year = parseInt(document.getElementById("modal-year").value) || null;
    const notes = document.getElementById("modal-notes").value.trim();
    visited[modalName] = { month, year, notes, relationshipType };
    if (wishlist[modalBorough] === modalName) delete wishlist[modalBorough];
    if (modalLayer) {
      modalLayer.setStyle(styleFeature(modalLayer.feature));
      const b = boroughKey(modalLayer.feature.properties);
      modalLayer.setTooltipContent(tooltipContent(modalName, b, visited[modalName]));
    }
    updateStats();
    showToast(`✓ ${modalName} saved`);
    closeModal();
  });

  document.getElementById("modal-unmark").addEventListener("click", () => {
    delete visited[modalName];
    if (modalLayer) {
      modalLayer.setStyle(styleFeature(modalLayer.feature));
      const b = boroughKey(modalLayer.feature.properties);
      modalLayer.setTooltipContent(tooltipContent(modalName, b, null));
    }
    updateStats();
    showToast(`${modalName} removed`);
    closeModal();
  });

  document.getElementById("modal-relationship").addEventListener("change", e => {
    if (e.target.value) document.getElementById("modal-relationship-error").style.display = "none";
  });

  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  function loadGeoJSON(data) {
    if (geojsonLayer) geojsonLayer.remove();
    labelsLayerGroup.clearLayers();
    Object.keys(labelMarkers).forEach(k => delete labelMarkers[k]);
    Object.keys(layersByName).forEach(k => delete layersByName[k]);
    highlightedLayer = null;
    allFeatures = data.features;

    geojsonLayer = L.geoJSON(data, {
      style: styleFeature,
      onEachFeature(feature, layer) {
        const name = neighborhoodName(feature.properties);
        const b = boroughKey(feature.properties);
        layersByName[name] = layer;

        layer.bindTooltip(tooltipContent(name, b, visited[name]), { sticky: true, opacity: 0.95 });

        layer.on("click", () => openModal(name, b, layer));

        layer.on("mouseover", function() {
          if (!isVisited(name)) this.setStyle({ fillOpacity: 0.7 });
        });
        layer.on("mouseout", function() {
          this.setStyle(styleFeature(feature));
        });

        const center = layer.getBounds().getCenter();
        const labelMarker = L.marker(center, {
          icon: L.divIcon({ className: "neighborhood-label", html: name, iconSize: [0, 0] }),
          interactive: false,
        }).addTo(labelsLayerGroup);
        labelMarkers[name] = labelMarker;
      }
    }).addTo(map);

    refreshLayer();
    updateNeighborhoodLabels();

    const legend = L.control({ position: "bottomright" });
    legend.onAdd = () => {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = Object.entries(RELATIONSHIP_TYPES).map(([type, c]) => `
        <div class="legend-row">
          <span class="legend-swatch" style="background:${c.fill};border:1px solid ${c.border}"></span>
          <span>${type}</span>
        </div>
      `).join("") + `
        <div class="legend-row" style="margin-top:6px;">
          <span class="legend-swatch" style="background:#fff;border:2px dashed ${WISHLIST_BORDER}"></span>
          <span>★ Wishlist</span>
        </div>
      ` + `<div style="border-top:1px solid #e0ded8;margin-top:6px;padding-top:6px;color:#888;font-size:11px">Faded = no relationship type set</div>`;
      return div;
    };
    legend.addTo(map);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 1800);
  }

  function isRandomEligible(name) {
    const entry = visited[name];
    return !entry || entry.relationshipType === "Visited Pre-Move";
  }

  function clearHighlight() {
    if (highlightedLayer) {
      highlightedLayer.setStyle(styleFeature(highlightedLayer.feature));
      highlightedLayer = null;
    }
  }

  document.getElementById("random-btn").addEventListener("click", () => {
    const wishlistOnly = document.getElementById("random-wishlist-only").checked;
    let pool;
    if (wishlistOnly) {
      pool = Object.values(wishlist).filter(name => layersByName[name] && isRandomEligible(name));
    } else {
      pool = allFeatures
        .map(f => neighborhoodName(f.properties))
        .filter(isRandomEligible);
    }
    if (!pool.length) {
      showToast(wishlistOnly ? "Your wishlist is empty" : "No eligible unvisited neighborhoods");
      return;
    }
    const name = pool[Math.floor(Math.random() * pool.length)];
    const layer = layersByName[name];
    clearHighlight();
    highlightedLayer = layer;
    layer.setStyle({ color: "#1a73e8", weight: 4, dashArray: null });
    layer.bringToFront();
    map.fitBounds(layer.getBounds(), { padding: [60, 60], maxZoom: 15 });
    showToast(`🎲 ${name}`);
  });

  // Borough filter
  document.querySelectorAll(".bfilter").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".bfilter").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeBorough = btn.dataset.b;
      refreshLayer();
      if (activeBorough !== "all" && geojsonLayer) {
        const bf = allFeatures.filter(f => boroughKey(f.properties) === activeBorough);
        if (bf.length) {
          map.fitBounds(L.geoJSON({ type: "FeatureCollection", features: bf }).getBounds(), { padding: [30, 30] });
        }
      } else {
        map.setView([40.7128, -74.006], 11);
      }
    });
  });

  // Save — new format: { visited: { name: { month, year, notes } }, wishlist: { borough: name } }
  document.getElementById("save-btn").addEventListener("click", () => {
    const data = { visited, wishlist };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "data.json";
    a.click();
    showToast("data.json downloaded — drag it into your repo!");
  });

  // Load — handles both old format (visited: []) and new format (visited: {})
  function parseDataJson(parsed) {
    if (!parsed.visited) return {};
    if (Array.isArray(parsed.visited)) {
      // migrate old format
      const out = {};
      parsed.visited.forEach(name => { out[name] = { month: null, year: null, notes: "" }; });
      return out;
    }
    return parsed.visited;
  }

  document.getElementById("load-btn").addEventListener("click", () => {
    document.getElementById("file-input").click();
  });
  document.getElementById("file-input").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const parsed = JSON.parse(evt.target.result);
        visited = parseDataJson(parsed);
        wishlist = parsed.wishlist || {};
        refreshLayer();
        showToast(`Loaded ${Object.keys(visited).length} visited neighborhoods`);
      } catch { showToast("Couldn't read that file — is it a valid data.json?"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  // Startup
  Promise.all([
    fetch("neighborhoods.geojson").then(r => r.json()),
    fetch("data.json").then(r => r.json()).catch(() => ({ visited: {}, wishlist: {} }))
  ]).then(([geo, data]) => {
    visited = parseDataJson(data);
    wishlist = data.wishlist || {};
    loadGeoJSON(geo);
  }).catch(err => {
    document.getElementById("map").innerHTML = `<div style="padding:2rem;color:#c00">
      <strong>Couldn't load map data.</strong><br>
      Make sure <code>neighborhoods.geojson</code> is in the same folder as this file.<br><br>
      <small>${err}</small>
    </div>`;
  });
</script>
</body>
</html>
